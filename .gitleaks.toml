# Gitleaks allowlist for Finvana - suppress false positives
# These are patterns that match test data, mock data, or are false positives

[allowlist]
    paths = [
        "node_modules/.*",
        "\\.git/.*",
        "dist/.*",
        "\\.next/.*",
    ]
    # Allow JWT test tokens - comma-separated regex strings
    regexes = [
        "eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*",
        "ghp_[a-zA-Z0-9]{36}",
        "test[_-]?token",
    ]